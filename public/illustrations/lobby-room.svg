<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Multiplayer lobby illustration">
  <defs>
    <linearGradient id="lr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="240" height="200" rx="18" fill="url(#lr)"/>
  <!-- 4 phones grouped -->
  <g transform="translate(20,30)">
    <rect width="40" height="64" rx="6" fill="white" stroke="#ec4899" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#ec4899"/>
    <rect x="6" y="32" width="28" height="2" fill="#e9d5ff"/>
    <rect x="6" y="38" width="20" height="2" fill="#e9d5ff"/>
  </g>
  <g transform="translate(80,30)">
    <rect width="40" height="64" rx="6" fill="white" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#7c3aed"/>
    <rect x="6" y="32" width="28" height="2" fill="#fce7f3"/>
    <rect x="6" y="38" width="20" height="2" fill="#fce7f3"/>
  </g>
  <g transform="translate(140,30)">
    <rect width="40" height="64" rx="6" fill="white" stroke="#fb923c" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#fb923c"/>
    <rect x="6" y="32" width="28" height="2" fill="#fde68a"/>
    <rect x="6" y="38" width="20" height="2" fill="#fde68a"/>
  </g>
  <g transform="translate(200,30)">
    <rect width="40" height="64" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#10b981"/>
    <rect x="6" y="32" width="28" height="2" fill="#d1fae5"/>
    <rect x="6" y="38" width="20" height="2" fill="#d1fae5"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.6">
    <line x1="60" y1="62" x2="80" y2="62"/>
    <line x1="120" y1="62" x2="140" y2="62"/>
    <line x1="180" y1="62" x2="200" y2="62"/>
  </g>
  <!-- Question bubble -->
  <g transform="translate(40,120)">
    <rect width="160" height="50" rx="14" fill="white" stroke="#ec4899" stroke-width="3"/>
    <text x="80" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="900" fill="#7c3aed">"Truth or cap?"</text>
  </g>
</svg>
