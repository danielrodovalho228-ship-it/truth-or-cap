<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Empty leaderboard illustration">
  <defs>
    <linearGradient id="lb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
  </defs>
  <rect width="240" height="200" rx="18" fill="url(#lb)"/>
  <!-- Podium -->
  <g transform="translate(60,90)">
    <rect x="0" y="40" width="40" height="60" fill="#a78bfa"/>
    <rect x="40" y="20" width="40" height="80" fill="#fbbf24"/>
    <rect x="80" y="50" width="40" height="50" fill="#f472b6"/>
    <text x="20" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="900" fill="white">2</text>
    <text x="60" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="900" fill="white">1</text>
    <text x="100" y="86" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="900" fill="white">3</text>
  </g>
  <!-- Crown -->
  <g transform="translate(116,68)">
    <polygon points="0,16 8,0 16,12 24,0 32,16 24,24 8,24" fill="#fbbf24"/>
    <circle cx="16" cy="6" r="2" fill="#fde68a"/>
  </g>
  <!-- Stars -->
  <g fill="#fbbf24" opacity="0.6">
    <polygon points="30,40 32,46 38,46 33,50 35,56 30,52 25,56 27,50 22,46 28,46"/>
    <polygon points="200,30 202,36 208,36 203,40 205,46 200,42 195,46 197,40 192,36 198,36"/>
    <polygon points="210,160 212,166 218,166 213,170 215,176 210,172 205,176 207,170 202,166 208,166"/>
  </g>
</svg>
