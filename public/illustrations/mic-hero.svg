<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-label="Microphone illustration">
  <defs>
    <radialGradient id="rg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </radialGradient>
  </defs>
  <rect width="240" height="200" rx="18" fill="url(#rg)"/>
  <!-- Mic -->
  <g transform="translate(120,100)">
    <ellipse cx="0" cy="-20" rx="24" ry="40" fill="#ec4899"/>
    <rect x="-3" y="20" width="6" height="30" fill="#7c3aed"/>
    <rect x="-30" y="50" width="60" height="6" rx="3" fill="#7c3aed"/>
    <!-- Sound waves -->
    <path d="M-50 -20 Q-60 -20 -60 -10 Q-60 0 -50 0" stroke="#fb923c" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M50 -20 Q60 -20 60 -10 Q60 0 50 0" stroke="#fb923c" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M-70 -20 Q-90 -20 -90 0 Q-90 20 -70 20" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M70 -20 Q90 -20 90 0 Q90 20 70 20" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Truth/Cap badges -->
  <g transform="translate(28,40)" font-family="Georgia, serif" font-weight="900">
    <rect width="60" height="30" rx="15" fill="#10b981"/>
    <text x="30" y="20" text-anchor="middle" fill="white" font-size="14">TRUTH</text>
  </g>
  <g transform="translate(154,40)" font-family="Georgia, serif" font-weight="900">
    <rect width="60" height="30" rx="15" fill="#ef4444"/>
    <text x="30" y="20" text-anchor="middle" fill="white" font-size="14">CAP</text>
  </g>
</svg>
