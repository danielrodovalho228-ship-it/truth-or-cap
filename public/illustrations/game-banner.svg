<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Truth or Cap banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b6cf6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="white" opacity="0.22"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#dots)"/>
  <!-- Soft glows -->
  <circle cx="220" cy="60" r="160" fill="url(#glow)"/>
  <circle cx="980" cy="170" r="180" fill="url(#glow)" opacity="0.7"/>
  <!-- Rounded badge with mic emoji -->
  <g transform="translate(70,40)">
    <rect width="120" height="120" rx="28" fill="white" opacity="0.18"/>
    <text x="60" y="92" text-anchor="middle" font-size="68">🎙️</text>
  </g>
  <!-- Wordmark -->
  <text x="220" y="92" font-family="Georgia, serif" font-size="56" font-weight="900" fill="white">Truth</text>
  <text x="220" y="146" font-family="Georgia, serif" font-size="32" font-style="italic" fill="white" opacity="0.9">or Cap.</text>
  <!-- Decorative chip cluster -->
  <g transform="translate(540,55)" fill="white" opacity="0.65">
    <circle cx="10" cy="50" r="5"/>
    <circle cx="36" cy="22" r="7"/>
    <circle cx="68" cy="58" r="4"/>
    <circle cx="100" cy="34" r="6"/>
    <circle cx="138" cy="68" r="4"/>
    <rect x="160" y="22" width="10" height="14" rx="3" transform="rotate(20 165 29)"/>
    <rect x="190" y="52" width="8" height="12" rx="3" transform="rotate(-25 194 58)"/>
  </g>
  <!-- Truth / Cap chips -->
  <g transform="translate(780,40)" font-family="Georgia, serif" font-weight="900">
    <rect width="92" height="36" rx="18" fill="#14b8a6"/>
    <text x="46" y="24" text-anchor="middle" fill="white" font-size="16">TRUTH</text>
  </g>
  <g transform="translate(890,90)" font-family="Georgia, serif" font-weight="900">
    <rect width="78" height="36" rx="18" fill="#f87171"/>
    <text x="39" y="24" text-anchor="middle" fill="white" font-size="16">CAP</text>
  </g>
  <!-- Mic icon -->
  <g transform="translate(1000,50)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round">
    <rect x="40" y="0" width="40" height="60" rx="20" fill="white" fill-opacity="0.22"/>
    <line x1="60" y1="60" x2="60" y2="92"/>
    <line x1="40" y1="92" x2="80" y2="92"/>
    <path d="M20 50 Q20 75 60 75 Q100 75 100 50"/>
  </g>
  <!-- Speech bubble -->
  <g transform="translate(1100,30)" fill="white" opacity="0.22">
    <rect x="0" y="0" width="80" height="56" rx="14"/>
    <polygon points="14,56 22,76 30,56"/>
  </g>
</svg>
