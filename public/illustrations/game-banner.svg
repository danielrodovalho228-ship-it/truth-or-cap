<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Truth or Cap banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="white" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#dots)"/>
  <!-- Rounded badge with T -->
  <g transform="translate(80,40)">
    <rect width="120" height="120" rx="28" fill="white" opacity="0.12"/>
    <text x="60" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="84" font-weight="900" fill="white">T</text>
  </g>
  <!-- Wordmark -->
  <text x="240" y="92" font-family="Georgia, serif" font-size="56" font-weight="900" fill="white">Truth</text>
  <text x="240" y="146" font-family="Georgia, serif" font-size="32" font-style="italic" fill="white" opacity="0.85">or Cap.</text>
  <!-- Decorative chips -->
  <g transform="translate(540,60)" fill="white" opacity="0.6">
    <circle cx="10" cy="40" r="4"/>
    <circle cx="30" cy="20" r="6"/>
    <circle cx="56" cy="50" r="3"/>
    <circle cx="90" cy="35" r="5"/>
    <circle cx="120" cy="65" r="3"/>
  </g>
  <!-- Mic icon -->
  <g transform="translate(900,50)" fill="none" stroke="white" stroke-width="4" stroke-linecap="round">
    <rect x="40" y="0" width="40" height="60" rx="20" fill="white" fill-opacity="0.18"/>
    <line x1="60" y1="60" x2="60" y2="92"/>
    <line x1="40" y1="92" x2="80" y2="92"/>
    <path d="M20 50 Q20 75 60 75 Q100 75 100 50"/>
  </g>
  <!-- Speech bubble -->
  <g transform="translate(1050,30)" fill="white" opacity="0.18">
    <rect x="0" y="0" width="100" height="60" rx="14"/>
    <polygon points="20,60 30,80 36,60"/>
  </g>
</svg>
